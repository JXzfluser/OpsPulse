# Pipeline: Deploy Dev

# Build, push service image, deploy to Dev, smoke test, update Issue status.

pipeline:
  name: opspulse-deploy-dev
  identifier: opspulse_deploy_dev
  description: OpsPulse Dev deployment for JDK8 microservices
  tags:
    opspulse: "true"
  stages:
    - stage:
        name: Build and Package
        identifier: build_package
        type: CI
        spec:
          execution:
            steps:
              - step:
                  type: Run
                  name: Build Microservice
                  identifier: build_package_step
                  spec:
                    shell: Bash
                    command: |
                      echo "[build_package] Microservice build placeholder"

    - stage:
        name: Push Service Image
        identifier: push_service_image
        type: CI
        spec:
          execution:
            steps:
              - step:
                  type: Run
                  name: Push Image
                  identifier: push_service_image_step
                  spec:
                    shell: Bash
                    command: |
                      echo "[push_service_image] Push Layer 3 image placeholder"

    - stage:
        name: Deploy Dev
        identifier: deploy_dev
        type: CI
        spec:
          execution:
            steps:
              - step:
                  type: Run
                  name: Deploy to Dev
                  identifier: deploy_dev_step
                  spec:
