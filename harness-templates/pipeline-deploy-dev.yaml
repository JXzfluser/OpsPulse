    - stage:
        name: Update Issue
        identifier: update_issue
        type: CI
        spec:
          execution:
            steps:
              - step:
                  type: Run
                  name: Update Issue Status
                  identifier: update_issue_step
                  spec:
                    shell: Bash
                    command: |
                      echo "[update_issue] update_issue_status placeholder"
