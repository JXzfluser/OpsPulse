name: "TDD 测试驱动开发"
description: "红→绿→重构循环，每个 AC 先写测试再写实现"
icon: "🧪"
stages:
  - id: parse
    name: "解析 Spec"
    auto: true
    command: "parse_issue"
    timeout: 300
    
  - id: design
    name: "技术方案设计"
    auto: false
    command: "ops_design"
    timeout: 3600
    requires_approval: true
    
  - id: test_write
    name: "编写测试用例 (Red)"
    auto: true
    command: "write_tests"
    timeout: 1800
    description: "先写失败的测试"
    
  - id: test_fail
    name: "验证测试失败"
    auto: true
    command: "run_tests --expect-failure"
    timeout: 600
    description: "确认测试确实失败了（红）"
    on_failure: abort
    
  - id: code_implement
    name: "编写实现代码 (Green)"
    auto: true
    command: "implement_code"
    timeout: 7200
    description: "写最少代码让测试通过"
    
  - id: test_pass
    name: "验证测试通过"
    auto: true
    command: "run_tests --expect-pass"
    timeout: 600
    description: "确认测试通过了（绿）"
    on_failure: rollback
    
  - id: refactor
    name: "重构"
    auto: false
    command: "refactor_code"
    timeout: 3600
    description: "清理代码，保持测试通过"
    requires_approval: true
    
  - id: pr_create
    name: "创建 PR"
    auto: true
    command: "ops_create_pr"
    timeout: 300
    
  - id: ci_trigger
    name: "触发 CI"
    auto: true
    command: "trigger_ci"
    timeout: 1800
    wait: true
    
  - id: smoke_test
    name: "冒烟测试"
    auto: true
    command: "ops_smoke_test"
    timeout: 900
    
  - id: deploy
    name: "部署"
    auto: false
    command: "ops_deploy"
    timeout: 1800
    requires_approval: true
    
  - id: status_update
    name: "回写状态"
    auto: true
    command: "update_issue_status"
    timeout: 60
