# OpsPulse 内置工作流模板
# 项目可通过 .opspulse.yaml 中的 custom_templates 覆盖

templates:
  # ==================== TDD 模式 ====================
  tdd:
    name: "TDD 测试驱动开发"
    description: "红→绿→重构循环，每个 AC 先写测试再写实现"
    icon: "🧪"
    stages:
      - id: parse
        name: "解析 Spec"
        auto: true
        command: "echo 'Parsing spec...'"
        timeout: 300
        
      - id: design
        name: "技术方案设计"
        auto: false
        command: "echo 'Designing solution...'"
        timeout: 3600
        requires_approval: true
        
      - id: test_write
        name: "编写测试用例 (Red)"
        auto: true
        command: "echo 'Writing failing tests...'"
        timeout: 1800
        description: "先写失败的测试"
        
      - id: test_fail
        name: "验证测试失败"
        auto: true
        command: "echo 'Verifying test failure (Red)...'"
        timeout: 600
        description: "确认测试确实失败了"
        on_failure: abort
        error_message: "测试通过了？说明测试有问题，请检查"
        
      - id: code_implement
        name: "编写实现代码 (Green)"
        auto: true
        command: "echo 'Implementing code to pass tests...'"
        timeout: 7200
        description: "写最少代码让测试通过"
        
      - id: test_pass
        name: "验证测试通过"
        auto: true
        command: "echo 'Verifying tests pass (Green)...'"
        timeout: 600
        description: "确认测试通过了"
        on_failure: rollback
        error_message: "测试没通过，代码有问题，请检查"
        
      - id: refactor
        name: "重构"
        auto: false
        command: "echo 'Refactoring code...'"
        timeout: 3600
        description: "清理代码，保持测试通过"
        requires_approval: true
        
      - id: pr_create
        name: "创建 PR"
        auto: true
        command: "echo 'Creating PR...'"
        timeout: 300
        
      - id: ci_trigger
        name: "触发 CI"
        auto: true
        command: "echo 'Triggering CI...'"
        timeout: 1800
        wait: true
        
      - id: smoke_test
        name: "冒烟测试"
        auto: true
        command: "echo 'Running smoke tests...'"
        timeout: 900
        
      - id: deploy
        name: "部署"
        auto: false
        command: "echo 'Deploying...'"
        timeout: 1800
        requires_approval: true
        
      - id: status_update
        name: "回写状态"
        auto: true
        command: "echo 'Updating status...'"
        timeout: 60

  # ==================== 正常开发模式 ====================
  normal:
    name: "标准开发流程"
    description: "设计→编码→PR→CI→部署"
    icon: "⚡"
    stages:
      - id: parse
        name: "解析 Spec"
        auto: true
        command: "echo 'Parsing spec...'"
        timeout: 300
        
      - id: design
        name: "技术方案设计"
        auto: false
        command: "echo 'Designing solution...'"
        timeout: 3600
        requires_approval: true
        
      - id: code_implement
        name: "编写代码"
        auto: true
        command: "echo 'Implementing code...'"
        timeout: 7200
        
      - id: pr_create
        name: "创建 PR"
        auto: true
        command: "echo 'Creating PR...'"
        timeout: 300
        
      - id: ci_trigger
        name: "触发 CI"
        auto: true
        command: "echo 'Triggering CI...'"
        timeout: 1800
        wait: true
        
      - id: deploy
        name: "部署"
        auto: false
        command: "echo 'Deploying...'"
        timeout: 1800
        requires_approval: true
        
      - id: status_update
        name: "回写状态"
        auto: true
        command: "echo 'Updating status...'"
        timeout: 60

  # ==================== 紧急修复 ====================
  hotfix:
    name: "紧急修复"
    description: "跳过设计，直接修复+验证"
    icon: "🔥"
    stages:
      - id: parse
        name: "解析 Spec"
        auto: true
        command: "echo 'Parsing spec...'"
        timeout: 300
        
      - id: code_implement
        name: "编写修复代码"
        auto: true
        command: "echo 'Implementing fix...'"
        timeout: 3600
        
      - id: test_pass
        name: "验证测试"
        auto: true
        command: "echo 'Verifying tests...'"
        timeout: 600
        
      - id: pr_create
        name: "创建 PR"
        auto: true
        command: "echo 'Creating PR...'"
        timeout: 300
        
      - id: ci_trigger
        name: "触发 CI"
        auto: true
        command: "echo 'Triggering CI...'"
        timeout: 1800
        wait: true
        
      - id: deploy
        name: "紧急部署"
        auto: false
        command: "echo 'Emergency deploy...'"
        timeout: 1800
        requires_approval: true

  # ==================== 大型功能 ====================
  feature:
    name: "大型功能开发"
    description: "拆分→并行→集成→全面测试"
    icon: "🏗️"
    stages:
      - id: parse
        name: "解析 Spec"
        auto: true
        command: "echo 'Parsing spec...'"
        timeout: 300
        
      - id: design
        name: "技术方案设计"
        auto: false
        command: "echo 'Designing solution...'"
        timeout: 7200
        requires_approval: true
        
      - id: breakdown
        name: "任务拆分"
        auto: true
        command: "echo 'Breaking down tasks...'"
        timeout: 3600
        
      - id: coding_parallel
        name: "并行编码"
        auto: true
        command: "echo 'Coding in parallel...'"
        timeout: 14400
        sub_stages:
          - name: "实现子任务 1"
            command: "echo 'Subtask 1...'"
          - name: "实现子任务 2"
            command: "echo 'Subtask 2...'"
          - name: "实现子任务 3"
            command: "echo 'Subtask 3...'"
        
      - id: integration
        name: "集成测试"
        auto: true
        command: "echo 'Running integration tests...'"
        timeout: 1800
        
      - id: pr_create
        name: "创建 PR"
        auto: true
        command: "echo 'Creating PR...'"
        timeout: 300
        
      - id: ci_trigger
        name: "触发 CI"
        auto: true
        command: "echo 'Triggering CI...'"
        timeout: 1800
        wait: true
        
      - id: deploy
        name: "部署"
        auto: false
        command: "echo 'Deploying...'"
        timeout: 1800
        requires_approval: true
