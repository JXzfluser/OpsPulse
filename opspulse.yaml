version: "1"
defaults:
  runtime:
    jdk_base_image: eclipse-temurin:8-jre
  build:
    jdk: "1.8"
    tool: maven
  deploy:
    env: dev
pipeline:
  default_mode: github-actions   # local = maintainer self-test only
  github_actions:
    ref: main
    repositories:
      # Example: chuanplus-platform monorepo (workflow_dispatch on existing cicd.yml)
      JXzfluser/chuanplus-platform:
        workflow: cicd.yml
        service_input: module
        pipelines:
          pr-validation:
            inputs:
              env: test
          deploy-dev:
            inputs:
              env: test
      # OpsPulse self-repo demo workflow
      JXzfluser/OpsPulse:
        workflow: opspulse-pr-validation.yml
        pipelines:
          pr-validation:
            inputs: {}
